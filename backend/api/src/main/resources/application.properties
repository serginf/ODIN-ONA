dataStorage.DataBaseType=JENA
dataStorage.JenaPath=api/dbFiles/jenaFiles/
dataStorage.DataLayerPath=api/dbFiles/DataLayer/
dataStorage.DataLayerTechnology=DuckDB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=8080

# --- Postgres datasource (override via env vars in Docker / CI) ---
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/odin}
spring.datasource.username=${POSTGRES_USER:odin}
spring.datasource.password=${POSTGRES_PASSWORD:odin}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# --- Flyway (manages non-JPA tables: events) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
