version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/odin
      - POSTGRES_USER=odin
      - POSTGRES_PASSWORD=odin
    depends_on:
      - postgres
      - graphdb
    volumes:
      - shared-data:/backend/api/api/dbFiles/DataLayer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    depends_on:
      - graphdb

  intents2workflows:
    build:
      context: ./backend/Modules/IntentSpecification2WorkflowGenerator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - graphdb
    volumes:
      - shared-data:/backend/api/api/dbFiles/DataLayer

  intents_anticipation:
    build:
      context: ./backend/Modules/IntentAnticipation
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    environment:
      - INTENTS2WORKFLOWS_URL=http://intents2workflows:8000
      - GRAPHDB_URL=http://graphdb:7200
    depends_on:
      - graphdb

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: odin
      POSTGRES_USER: odin
      POSTGRES_PASSWORD: odin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  graphdb:
    build:
      context: .
      dockerfile: Dockerfile.graphdb
    ports:
      - "7200:7200"


volumes:
  shared-data:
  postgres-data: